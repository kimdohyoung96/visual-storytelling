# DCEE-CausalVerse STRICT FINAL config: V35
# Goal: stronger protagonist identity consistency + explicit visual storytelling progression + non-empty story-aligned background
# No DummyLLM, no fallback LLM

llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.35
  max_tokens: 1600

vlm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 800

image_understanding:
  provider: llm_caption
  caption_model: Salesforce/blip-image-captioning-base

image_generator:
  provider: sdxl_crossattn
  model_id: stabilityai/stable-diffusion-xl-base-1.0
  device: cuda
  width: 1024
  height: 1024
  num_inference_steps: 36
  guidance_scale: 7.5
  num_candidates_per_frame: 4
  num_ending_candidates: 6
  seed: 42
  enable_cpu_offload: false

  use_ip_adapter: true
  ip_adapter_scale: 0.62

  canonical_reference_sheet_path: ""
  identity_backend_priority: ["canonical_reference_sheet", "character_lora", "ip_adapter", "text"]

  use_character_lora: false
  character_lora_path: ""
  character_lora_scale: 0.85

  use_instantid: false
  instantid_adapter_path: ""
  instantid_controlnet_path: ""

  use_photomaker: false
  photomaker_adapter_path: ""

cross_attention_adapters:
  character_tokens: 8
  world_tokens: 8
  emotion_tokens: 8
  event_tokens: 8
  evidence_tokens: 8

butterfly:
  num_hypotheses: 3
  quality_suffix: "full-color cinematic storybook illustration, event-grounded, evidence-visible, emotionally expressive, rich natural colors, detailed world, sharp focus, identity-consistent protagonist, stable face and body details, consistent hands and feet, story-aligned background, clear foreground-midground-background composition, progressing visual storytelling"
  negative_prompt: "monochrome, grayscale, black and white, missing event, missing evidence, weak emotion, low quality, blurry, cropped character, partial face, missing hands, missing feet, malformed hands, malformed feet, extra fingers, deformed body, inconsistent character identity, different protagonist, flat background, empty background, blank background, generic portrait, unrelated background, scene not matching story, repeated static scene"

pipeline:
  memory_strategy: adaptive_causal
  emotion_retry: true
  emotion_visibility_threshold: 0.74
  colorfulness_threshold: 0.35
  event_grounding_threshold: 0.78
  evidence_visibility_threshold: 0.78
  story_alignment_threshold: 0.82
  background_presence_threshold: 0.52
  progression_threshold: 0.42

evaluation:
  use_vlm: false
  save_contact_sheet: true
