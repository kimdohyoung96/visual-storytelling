llm:
  provider: openai_compatible
  model: ${OPENAI_MODEL:gpt-4o-mini}
  base_url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  api_key_env: OPENAI_API_KEY
  temperature: 0.4
  max_tokens: 2500

vlm:
  provider: openai_compatible
  model: ${OPENAI_VLM_MODEL:gpt-4o-mini}
  base_url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
  api_key_env: OPENAI_API_KEY

image_understanding:
  provider: llm_caption
  caption_model: Salesforce/blip-image-captioning-base

image_generator:
  provider: sdxl
  model_id: stabilityai/stable-diffusion-xl-base-1.0
  device: cuda
  width: 1024
  height: 1024
  num_inference_steps: 40
  guidance_scale: 7.0
  num_candidates_per_frame: 2
  num_ending_candidates: 4
  seed: 42
  enable_cpu_offload: false

pipeline:
  memory_strategy: multi_slot
  include_input_image_summary: true

butterfly:
  num_hypotheses: 3
  quality_suffix: high quality, polished cinematic storybook illustration, expressive face, coherent anatomy, rich environment storytelling, cinematic lighting, sharp focus
  negative_prompt: low quality, blurry, distorted face, changed identity, inconsistent outfit, extra limbs, bad anatomy, empty background, vague environment

evaluation:
  use_vlm: false
  save_contact_sheet: true
