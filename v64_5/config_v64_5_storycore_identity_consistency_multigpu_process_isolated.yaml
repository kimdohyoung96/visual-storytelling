llm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.2
  max_tokens: 1800
vlm:
  provider: openai
  model: gpt-4o-mini
  temperature: 0.0
  max_tokens: 900
image_understanding:
  provider: llm_caption
  caption_model: Salesforce/blip-image-captioning-base
image_generator:
  provider: sdxl_crossattn
  model_id: stabilityai/stable-diffusion-xl-base-1.0
  device: cuda
  width: 896
  height: 896
  num_inference_steps: 50
  guidance_scale: 11.0
  num_candidates_per_frame: 24
  num_ending_candidates: 14
  text_only_num_candidates_per_frame: 24
  text_only_num_ending_candidates: 20
  seed: 42
  consistent_identity_seed_across_frames: true
  force_token_safe_prompt: true
  enable_cpu_offload: false
  use_ip_adapter: false
  ip_adapter_scale: 0.0
  canonical_reference_sheet_path: ''
  identity_backend_priority:
  - text
  protagonist_reference_paths: []
  use_character_lora: false
  character_lora_path: ''
  character_lora_scale: 0.85
  use_instantid: false
  instantid_adapter_path: ''
  instantid_controlnet_path: ''
  use_photomaker: false
  photomaker_adapter_path: ''
  use_subject_scene_fusion: false
  subject_scene_fusion_scale: 0.72
  subject_scene_fusion_first_n: 0
  text_only_use_previous_frame_reference: true
  multi_gpu: true
  gpu_ids:
  - 0
  - 1
  - 2
  - 3
  max_parallel_generators: 4
  oom_safe_generation: true
  oom_retry_width: 768
  oom_retry_height: 768
  enable_vae_tiling: true
  enable_vae_slicing: true
  enable_attention_slicing: true
  v64_3_cuda_safe_multigpu: true
  min_free_memory_gb: 28.0
  skip_busy_gpus: true
  continue_on_worker_failure: true
  max_candidate_failures_per_frame: 999
  v64_4_failsafe_lowres: true
  force_safe_lowres_generation: true
  safe_generation_width: 768
  safe_generation_height: 768
  safe_num_inference_steps: 34
  disable_fusion_in_multigpu_safe: true
  v64_5_process_isolated_multigpu: true
  process_isolated_multi_gpu: true
cross_attention_adapters:
  character_tokens: 8
  world_tokens: 8
  emotion_tokens: 8
  event_tokens: 8
  evidence_tokens: 8
butterfly:
  num_hypotheses: 3
  quality_suffix: full-color cinematic storybook illustration, exact sentence grounding,
    same white bear identity, visible honey jar state, readable expression, readable
    background, clear action, DCEE progression
  negative_prompt: rabbit, raccoon, fox, squirrel, deer, dog, cat, brown bear, panda,
    teddy bear, plush toy, extra animal, extra human, duplicate protagonist, unrelated
    prop, book, indoor scene, vehicle, missing honey jar, missing environment
pipeline:
  text_only_anchor_with_first_frame: true
  text_only_anchor_with_previous_two_frames: true
  final_frame_identity_boost: true
  memory_strategy: adaptive_causal
  use_llm_frame_prompt: true
  llm_frame_prompt_temperature: 0.0
  llm_frame_prompt_max_tokens: 900
  stronger_literal_story_grounding: true
  emotion_retry: true
  text_only_force_variant_sweep: true
  text_only_variant_sweep:
  - storycore
  - identity
  - signature_emotion
  - signature
  - emotion_face
  - complete
  - object
  - scene
  - action
  - color
  text_only_variant_candidates_per_focus: 3
  emotion_visibility_threshold: 0.78
  colorfulness_threshold: 0.34
  event_grounding_threshold: 0.86
  evidence_visibility_threshold: 0.84
  story_alignment_threshold: 0.95
  background_presence_threshold: 0.66
  progression_threshold: 0.6
  critical_noun_coverage_threshold: 0.92
  progression_consistency_threshold: 0.6
  story_context_alignment_threshold: 0.68
  protagonist_species_threshold: 0.9
  protagonist_age_threshold: 0.88
  protagonist_white_exact_threshold: 0.9
  forbidden_species_penalty_max: 0.06
  text_only_story_alignment_threshold: 0.95
  text_only_critical_noun_coverage_threshold: 0.92
  text_only_background_presence_threshold: 0.64
  text_only_story_context_alignment_threshold: 0.74
  text_only_protagonist_species_threshold: 0.95
  text_only_protagonist_age_threshold: 0.92
  text_only_protagonist_white_exact_threshold: 0.95
  identity_consistency_threshold: 0.78
  reference_subject_similarity_threshold: 0.72
  continuity_threshold: 0.72
  text_only_identity_consistency_threshold: 0.84
  text_only_reference_subject_similarity_threshold: 0.78
  text_only_continuity_threshold: 0.8
  frame1_num_candidates: 20
  frame1_species_threshold: 0.96
  frame1_white_threshold: 0.96
  frame1_color_threshold: 0.98
  frame1_age_threshold: 0.94
  frame1_object_threshold: 0.75
  frame1_sentence_threshold: 0.84
  text_only_forbidden_species_penalty_max: 0.04
  use_json_grounded_story_steps: true
  respect_input_story_sentences: true
  use_generated_story_as_image_source: true
  v59_paper_flow_grounding: true
  frame_grounding_sources:
  - abstract
  - generated_story
  - frame_caption
  - dcee_plan
  - input_json
  - frame_render_contract
  v60_strict_story_frame_only: true
  disable_fallback_generation: true
  force_text_story_only: true
  v61_story_abstract_caption_strict: true
  use_identity_anchor_contract: true
  strict_story_details_only: true
  v611_planner_fallback_safe: true
  v611_frame_contract_strict: true
  canonical_protagonist_contract_enabled: true
  frame_render_contract_enabled: true
  force_json_story_flow: true
  v62_story_exact_candidate_gate: true
  v62_1_pipe_cfg_hotfix: true
  v62_2_total_frames_hotfix: true
  v63_signature_emotion_storycore: true
  emotion_face_visibility_threshold: 0.58
  text_only_emotion_face_visibility_threshold: 0.62
  signature_item_coverage_threshold: 0.84
  text_only_signature_item_coverage_threshold: 0.9
  text_only_sentence_complete_threshold: 0.7
  text_only_object_word_threshold: 0.5
  text_only_emotion_word_threshold: 0.4
  v63_1_signature_coverage_hotfix: true
  v64_storycore_identity_consistency: true
  sentence_complete_threshold: 0.72
  v64_2_multigpu_oomsafe: true
evaluation:
  use_vlm: false
  save_contact_sheet: true
selection:
  word_coverage_threshold: 0.78
  action_word_threshold: 0.72
  emotion_word_threshold: 0.5
  color_word_threshold: 0.96
  object_word_threshold: 0.82
  scene_word_threshold: 0.72
  sentence_complete_threshold: 0.88
  protagonist_color_threshold: 0.96
  protagonist_species_threshold: 0.93
  protagonist_age_threshold: 0.9
  protagonist_white_exact_threshold: 0.93
  forbidden_species_penalty_max: 0.06
  text_only_sentence_complete_threshold: 0.76
  text_only_protagonist_color_threshold: 0.97
  text_only_protagonist_species_threshold: 0.95
  text_only_protagonist_age_threshold: 0.92
  text_only_protagonist_white_exact_threshold: 0.95
  identity_consistency_threshold: 0.78
  reference_subject_similarity_threshold: 0.72
  continuity_threshold: 0.72
  text_only_identity_consistency_threshold: 0.82
  text_only_reference_subject_similarity_threshold: 0.76
  text_only_continuity_threshold: 0.78
  frame1_num_candidates: 18
  frame1_species_threshold: 0.95
  frame1_white_threshold: 0.95
  frame1_color_threshold: 0.97
  frame1_age_threshold: 0.93
  frame1_object_threshold: 0.75
  frame1_sentence_threshold: 0.84
  text_only_forbidden_species_penalty_max: 0.04
  text_only_object_word_threshold: 0.68
  text_only_scene_word_threshold: 0.52
  story_word_coverage_threshold: 0.75
  critical_noun_coverage_threshold: 0.94
